<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Showcase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:#f4f6f9;
  padding:40px;
}

/* ===== TITLE ===== */
h1{
  text-align:center;
  margin-bottom:40px;
}

/* ===== CARD GRID ===== */
.vehicle-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:15px;
  text-align:center;
}

.card-content h3{
  margin-bottom:10px;
}

.card-content button{
  padding:8px 20px;
  border:none;
  background:#000;
  color:#fff;
  cursor:pointer;
  border-radius:20px;
  transition:0.3s;
}

.card-content button:hover{
  background:#ff4d4d;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:400px;
  border-radius:10px;
  padding:20px;
  text-align:center;
  position:relative;
  animation:fadeIn 0.3s ease-in-out;
}

.modal-content img{
  width:100%;
  border-radius:8px;
  margin-bottom:15px;
}

.close{
  position:absolute;
  right:15px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

/* Animation */
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

</style>
</head>
<body>

<h1>Our Electric Vehicles</h1>

<div class="vehicle-container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
    <div class="card-content">
      <h3>Model S</h3>
      <button onclick="openModal('Model S','High performance electric sedan','$80,000','https://images.unsplash.com/photo-1619767886558-efdc259cde1a')">View Details</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1549921296-3c3eaa7e3d3b">
    <div class="card-content">
      <h3>Model X</h3>
      <button onclick="openModal('Model X','Luxury electric SUV','$95,000','https://images.unsplash.com/photo-1549921296-3c3eaa7e3d3b')">View Details</button>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="vehicleModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <h3 id="modalPrice"></h3>
  </div>
</div>

<script>

function openModal(title,desc,price,image){
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDesc").innerText = desc;
  document.getElementById("modalPrice").innerText = price;
  document.getElementById("modalImage").src = image;

  document.getElementById("vehicleModal").style.display="flex";
}

function closeModal(){
  document.getElementById("vehicleModal").style.display="none";
}

</script>

</body>
</html>
